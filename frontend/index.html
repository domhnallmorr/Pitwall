<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Pitwall</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Title Screen -->
  <div class="title-screen" id="title-screen">
    <div class="title-content">
      <button id="start-career-btn" class="btn-primary">Start Career</button>
    </div>
  </div>

  <!-- Game Dashboard (Hidden by default) -->
  <div id="game-dashboard" class="dashboard-container" style="display: none;">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo-area">Pitwall</div>
      <nav>
        <button class="nav-item active">Home</button>
        <button class="nav-item">Email</button>
        <button class="nav-item">Calendar</button>
        <button class="nav-item">Grid</button>
        <button class="nav-item">Standings</button>
      </nav>
      <div class="sidebar-footer">
        <button id="advance-btn" class="btn-advance">ADVANCE</button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-wrapper">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="left-info">
          <div id="team-name" class="team-info">Team Name</div>
          <span id="current-week" class="week-info">Week 1 1998</span>
        </div>
        <div class="right-info">
          <span id="next-event" class="date-info">Next: Loading...</span>
        </div>
      </div>

      <!-- Page Content -->
      <div class="content-area">

        <!-- Home View -->
        <div id="home-view" class="view-section">
          <h2>Dashboard Home</h2>
          <p>Welcome to the Pitwall.</p>
        </div>

        <!-- Calendar View -->
        <div id="calendar-view" class="view-section" style="display: none;">
          <div class="view-header">
            <h2>Season Calendar</h2>
            <div class="controls">
              <label for="calendar-filter">Filter:</label>
              <select id="calendar-filter">
                <option value="all">All Events</option>
                <option value="Grand Prix">Grand Prix</option>
                <option value="Test">Tests</option>
              </select>
            </div>
          </div>
          <div id="calendar-content">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Rnd</th>
                  <th>Week</th>
                  <th>Event</th>
                  <th>Track</th>
                  <th>Country</th>
                  <th>Winner</th>
                </tr>
              </thead>
              <tbody id="calendar-table-body">
                <!-- JS populated -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Grid View -->
        <div id="grid-view" class="view-section" style="display: none;">
          <div class="tabs">
            <button class="tab-btn active" data-year="1998">1998</button>
            <button class="tab-btn" data-year="1999">1999</button>
          </div>

          <div id="grid-content-1998" class="grid-content">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Team</th>
                  <th>Driver 1</th>
                  <th>Driver 2</th>
                </tr>
              </thead>
              <tbody id="grid-table-body">
                <!-- Rows populated by JS -->
              </tbody>
            </table>
          </div>

          <div id="grid-content-1999" class="grid-content" style="display: none;">
            <div class="placeholder-msg">
              <h3>1999 Season</h3>
              <p>Grid not yet finalized.</p>
            </div>
          </div>
        </div>

        <!-- Standings View -->
        <div id="standings-view" class="view-section" style="display: none;">
          <div class="tabs">
            <button class="tab-btn standings-tab-btn active" data-type="drivers">Drivers</button>
            <button class="tab-btn standings-tab-btn" data-type="constructors">Constructors</button>
          </div>

          <!-- Drivers Table -->
          <div id="standings-content-drivers">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Pos</th>
                  <th>Driver</th>
                  <th>Points</th>
                </tr>
              </thead>
              <tbody id="driver-standings-body">
                <!-- JS populated -->
              </tbody>
            </table>
          </div>

          <!-- Constructors Table -->
          <div id="standings-content-constructors" style="display: none;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Pos</th>
                  <th>Team</th>
                  <th>Points</th>
                </tr>
              </thead>
              <tbody id="constructor-standings-body">
                <!-- JS populated -->
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Debug Panel (Hidden/Small) -->
  <div class="debug-panel">
    <span style="margin-right: 10px; opacity: 0.7;">Debug:</span>
    <button id="ping-btn">Ping</button>
    <button id="roster-btn">Load Roster</button>
  </div>

  <script type="module" src="./src/renderer.js"></script>
</body>

</html>
