<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Pitwall</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Title Screen -->
  <div class="title-screen" id="title-screen">
    <div class="title-content">
      <button id="start-career-btn" class="btn-primary">Start Career</button>
    </div>
  </div>

  <!-- Game Dashboard (Hidden by default) -->
  <div id="game-dashboard" class="dashboard-container" style="display: none;">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo-area">Pitwall</div>
      <nav>
        <button class="nav-item active">Home</button>
        <button class="nav-item">Email</button>
        <button class="nav-item">Grid</button>
        <button class="nav-item">Standings</button>
      </nav>
    </div>

    <!-- Main Content Area -->
    <div class="main-wrapper">
      <!-- Top Bar -->
      <div class="top-bar">
        <div id="team-name" class="team-info">Team Name</div>
        <!-- Date Display: Will show "Australia - Week 8 1998" -->
        <div id="date-display" class="date-info">Date</div>
      </div>

      <!-- Page Content -->
      <div class="content-area">
        <h2>Dashboard Home</h2>
        <p>Welcome to the Pitwall.</p>
      </div>
    </div>
  </div>

  <!-- Debug Panel (Hidden/Small) -->
  <div class="debug-panel">
    <span style="margin-right: 10px; opacity: 0.7;">Debug:</span>
    <button id="ping-btn">Ping</button>
    <button id="roster-btn">Load Roster</button>
  </div>

  <script>
    // Buttons
    const startBtn = document.getElementById('start-career-btn')
    const btn = document.getElementById('ping-btn')
    const rosterBtn = document.getElementById('roster-btn')

    // UI Elements
    const titleScreen = document.getElementById('title-screen');
    const dashboard = document.getElementById('game-dashboard');
    const teamNameEl = document.getElementById('team-name');
    const dateEl = document.getElementById('date-display');

    // --- Event Listeners ---

    startBtn.addEventListener('click', () => {
      console.log("Starting Career...");
      window.electronAPI.sendToPython({ type: 'start_career' });
    });

    btn.addEventListener('click', () => {
      console.log('> Sending Ping...');
      window.electronAPI.sendToPython({ type: 'ping' })
    })

    rosterBtn.addEventListener('click', () => {
      console.log('> Loading Roster...');
      window.electronAPI.sendToPython({ type: 'load_roster' })
    })

    // --- IPC Handler ---

    window.electronAPI.onPythonData((data) => {
      console.log('Python Data:', data);
      try {
        const parsed = JSON.parse(data);

        // Handle Game Start Success
        if (parsed.type === 'game_started' && parsed.status === 'success') {
          titleScreen.style.display = 'none';
          dashboard.style.display = 'flex';

          teamNameEl.textContent = parsed.data.team_name;

          // Format: "Australia - Week 8 1998"
          const dateStr = parsed.data.current_date; // "Australia - Week 8"
          const yearStr = parsed.data.year;         // 1998
          dateEl.textContent = `${dateStr} ${yearStr}`;
        }
        else if (parsed.type === 'status') {
          console.log("Status:", parsed.message);
        } else if (parsed.data) {
          console.log("Data Received");
        }
      } catch (e) {
        console.error('Raw Data:', data);
      }
    })
  </script>
</body>

</html>
